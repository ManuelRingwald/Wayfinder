# golangci-lint configuration (v2 schema).
#
# The "standard" linter set (errcheck, govet, ineffassign, staticcheck, unused)
# — the widely-agreed sensible default. errcheck (unchecked error returns) is
# enabled: the ~30 legacy findings were cleaned up in #124 (real error paths
# handled, deliberate fire-and-forget calls marked with `_ =`).
version: "2"

linters:
  default: standard
