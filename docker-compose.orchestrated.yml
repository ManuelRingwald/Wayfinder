# End-to-end orchestration harness (ORCH-5c, ADR 0012) — the auto-spawning chain
# wired into one runnable stack: assign a feed → the orchestrator spawns a Firefly
# tracker for it → CAT062/UDP-multicast → the ASD shows tracks.
#
# This is NOT the production deployment topology — it is a single-host acceptance
# harness. It builds on the multi-tenant core stack (Postgres + the Wayfinder
# server in builtin-auth mode, like docker-compose.onboarding.yml) and adds the
# least-privilege orchestrator control plane for per-feed Firefly auto-spawn.
#
# Run the acceptance walk-through with docs/E2E-ABNAHME.md (or scripts/e2e-orchestrated.sh).
#
# Networking: server, orchestrator and the spawned Firefly containers all use host
# networking so CAT062/UDP-multicast (239.255.0.62:8600) reaches the receiver —
# multicast does not traverse Docker's default bridge. Postgres publishes 5432 to
# the host, so the host-networked processes reach it at 127.0.0.1:5432.
#
# Security (ADR 0012 §6): ONLY the orchestrator mounts the Docker socket. The
# browser-facing server never gets that privilege.

services:
  db:
    image: postgres:16-bookworm
    environment:
      POSTGRES_USER: wayfinder
      POSTGRES_PASSWORD: wayfinder
      POSTGRES_DB: wayfinder
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "wayfinder"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Browser-facing ASD server. Owns the schema (runs migrations on start), serves
  # the admin UI + WebSocket, and receives the CAT062 feed off the multicast group.
  wayfinder:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    depends_on:
      db:
        condition: service_healthy
    environment:
      WAYFINDER_DB_URL: "postgres://wayfinder:wayfinder@127.0.0.1:5432/wayfinder?sslmode=disable"
      # Multi-tenant builtin auth (ADR 0014 — the only mode). On first boot a
      # default admin (admin/admin, forced password change) is auto-seeded
      # (ONB-1, ADR 0011). The orchestrator is feed-driven and tenant-agnostic,
      # so auto-spawn works independently of the auth mode. The session key is
      # left unset (ephemeral key + warning); set WAYFINDER_SESSION_KEY for a
      # restart-stable, multi-replica deployment.
      WAYFINDER_AUTH_MODE: "builtin"
      FIREFLY_CAT062_GROUP: ${FIREFLY_CAT062_GROUP:-239.255.0.62}
      FIREFLY_CAT062_PORT: ${FIREFLY_CAT062_PORT:-8600}
      # Same key as the orchestrator — only needed for the authenticated-source
      # walk-through (credentialled OpenSky); empty is fine for the anonymous/scene run.
      WAYFINDER_SECRET_KEY: ${WAYFINDER_SECRET_KEY:-}
      WAYFINDER_MAP_CENTER_LAT: ${WAYFINDER_MAP_CENTER_LAT:-50.0379}
      WAYFINDER_MAP_CENTER_LON: ${WAYFINDER_MAP_CENTER_LON:-8.5622}
      WAYFINDER_MAP_ZOOM: ${WAYFINDER_MAP_ZOOM:-8}
      # Base-map theme (ADR 0026): bkg-dark (official radar scope, default)
      # or bkg (bright). Legacy values dark/osm are aliased server-side.
      # WAYFINDER_BKG_STYLE_URL optionally points at a self-hosted mirror,
      # the grey variant or the Germany-only style.
      WAYFINDER_MAP_THEME: ${WAYFINDER_MAP_THEME:-bkg-dark}
      WAYFINDER_BKG_STYLE_URL: ${WAYFINDER_BKG_STYLE_URL:-}
    restart: unless-stopped

  # Least-privilege control plane. Reads the desired state (subscribed feeds +
  # source config) and converges the running Firefly set toward it via the Docker
  # backend. The ONLY service with the Docker socket.
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    network_mode: host
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # The container-runtime privilege (ADR 0012 §6). Read-write: the orchestrator
      # creates/starts/stops/removes the per-feed Firefly containers.
      #
      # ⚠️ SECURITY: mounting the Docker socket grants this container root-equivalent
      # control of the host. That is exactly why the orchestrator is a SEPARATE,
      # least-privilege process and the browser-facing server never gets the socket.
      # In production, treat the orchestrator host/node as a high-value trust
      # boundary (network isolation, restricted access) — see docs/E2E-ABNAHME.md.
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WAYFINDER_DB_URL: "postgres://wayfinder:wayfinder@127.0.0.1:5432/wayfinder?sslmode=disable"
      WAYFINDER_ORCHESTRATOR_BACKEND: "docker"
      # The Firefly image the orchestrator runs per feed. Build it from the Firefly
      # repo (docker build -t firefly:latest .) or set this to a published tag.
      WAYFINDER_FIREFLY_IMAGE: ${WAYFINDER_FIREFLY_IMAGE:-firefly:latest}
      # Host networking for the spawned trackers so their multicast reaches the
      # server (matches this compose's host-net topology).
      WAYFINDER_FIREFLY_NETWORK: "host"
      # Feeds WITHOUT live sources get the explicit empty contract
      # (FIREFLY_SOURCES=[]): the spawned Firefly idles with an empty sky and
      # keeps emitting the CAT065 heartbeat (Firefly ADR 0030) — no placeholder
      # scene any more.
      # Same key as the server (only needed for credentialled sources, ORCH-5b).
      WAYFINDER_SECRET_KEY: ${WAYFINDER_SECRET_KEY:-}
      # Tighten the reconcile period so the harness converges quickly; the
      # change-driven trigger (LISTEN/NOTIFY) usually fires first.
      WAYFINDER_ORCHESTRATOR_INTERVAL: ${WAYFINDER_ORCHESTRATOR_INTERVAL:-10s}
      WAYFINDER_LOG_LEVEL: ${WAYFINDER_LOG_LEVEL:-info}
    restart: unless-stopped
