<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wayfinder — ASD</title>
    <link
      href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <style>
      html, body, #map {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      /* Feed-health banner (CAT065 heartbeat). Hidden until a state is known. */
      #feed-status {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 10;
        padding: 6px 12px;
        border-radius: 4px;
        font: 600 13px/1.2 system-ui, sans-serif;
        color: #fff;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
        display: none;
      }
      #feed-status.ok { background: #1a7f37; display: block; }
      #feed-status.stale { background: #b42318; display: block; }
      #feed-status.unknown { background: #6c757d; display: block; }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="feed-status"></div>
    <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
    <script src="app.js"></script>
  </body>
</html>
