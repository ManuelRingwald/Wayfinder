<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wayfinder — ASD</title>
    <link
      href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <style>
      html, body, #map {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      /* Feed-health banner (CAT065 heartbeat). Hidden until a state is known. */
      #feed-status {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 10;
        padding: 6px 12px;
        border-radius: 4px;
        font: 600 13px/1.2 system-ui, sans-serif;
        color: #fff;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
        display: none;
      }
      #feed-status.ok { background: #1a7f37; display: block; }
      #feed-status.yellow { background: #b45309; display: block; }
      #feed-status.stale { background: #b42318; display: block; }
      #feed-status.unknown { background: #6c757d; display: block; }

      /* Aeronautical layer control (ASD-003): toggle map overlays. */
      #layer-control {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 10;
        padding: 8px 10px;
        border-radius: 4px;
        background: rgba(11, 15, 20, 0.82);
        color: #e8eef5;
        font: 12px/1.4 system-ui, sans-serif;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
      }
      #layer-control .title {
        font-weight: 600;
        margin-bottom: 4px;
        opacity: 0.8;
      }
      #layer-control label {
        display: block;
        cursor: pointer;
      }
      /* ASD-005: FL-filter number inputs, styled to match the dark scope. */
      .fl-inputs {
        display: flex;
        gap: 4px;
        align-items: center;
        margin-bottom: 4px;
      }
      .fl-inputs input[type="number"] {
        width: 46px;
        background: #1a2030;
        color: #e8eef5;
        border: 1px solid #3a4a60;
        border-radius: 3px;
        padding: 2px 4px;
        font-size: 11px;
        -moz-appearance: textfield;
      }
      .fl-inputs input[type="number"]::-webkit-outer-spin-button,
      .fl-inputs input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
      #layer-control hr { border: none; border-top: 1px solid rgba(255,255,255,0.15); margin: 6px 0; }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="feed-status"></div>
    <div id="layer-control">
      <div class="title">Layer</div>
      <label><input type="checkbox" id="toggle-airspace" checked /> Lufträume</label>
      <label><input type="checkbox" id="toggle-navaids" checked /> VOR/NDB</label>
      <label><input type="checkbox" id="toggle-waypoints" checked /> Waypoints</label>
      <hr>
      <div class="title">FL-Filter</div>
      <div class="fl-inputs">
        <input type="number" id="fl-min" placeholder="min" min="0" max="999" step="10">
        <span>–</span>
        <input type="number" id="fl-max" placeholder="max" min="0" max="999" step="10">
        <span style="opacity:0.7">FL</span>
      </div>
      <label><input type="checkbox" id="fl-hide"> Ausblenden</label>
    </div>
    <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
    <script src="app.js"></script>
  </body>
</html>
