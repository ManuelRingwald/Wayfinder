# Zero-touch onboarding stack (ONB-1, ADR 0011).
#
# Brings up the full multi-tenant Wayfinder platform — PostgreSQL + the Wayfinder
# server in builtin-auth mode — with a single command:
#
#     docker compose -f docker-compose.onboarding.yml up --build
#
# Run from the wayfinder repo root. Works on macOS, Windows and Linux alike.
#
# On first boot Wayfinder auto-provisions a default tenant and a default admin
# (username "admin", password "admin"). Open http://localhost:8081/admin, log in,
# and you are immediately required to set a new password before anything else is
# reachable (must_change_password, enforced server-side). No `bootstrap` or
# `feed add` terminal step is needed to get a usable login.
#
# Note on tracks: this file uses bridge networking so it works everywhere.
# UDP multicast (CAT062/Firefly) does not traverse bridge networks, so the map
# will start empty. For live tracks, run Firefly separately with host networking
# on Linux, or use the master-compose approach from DOCKER.md on any platform.
#
# This is the canonical Wayfinder deployment stack (multi-tenant is the only mode,
# ADR 0014). Use it for a standalone platform with the built-in login; for the
# end-to-end harness that also auto-spawns Firefly per feed, see
# docker-compose.orchestrated.yml.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wayfinder
      POSTGRES_PASSWORD: wayfinder
      POSTGRES_DB: wayfinder
    # No host-port binding: wayfinder reaches the database via bridge-network DNS
    # (service name "db"). This avoids port-5432 conflicts with any local PostgreSQL.
    volumes:
      - wayfinder-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wayfinder -d wayfinder"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  wayfinder:
    build:
      context: .
      dockerfile: Dockerfile
    # Bridge networking: wayfinder reaches the database via the service name "db".
    # Works on macOS, Windows and Linux without any extra configuration.
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8081"   # ASD frontend / browser
      - "8080:8080"   # health, readiness, metrics
    environment:
      # Firefly's CAT062/UDP-multicast feed (ADR 0006 / ICD-CAT062.md).
      FIREFLY_CAT062_GROUP: ${FIREFLY_CAT062_GROUP:-239.255.0.62}
      FIREFLY_CAT062_PORT: ${FIREFLY_CAT062_PORT:-8600}
      # Multi-tenancy + builtin login. The default admin is auto-seeded on first
      # boot (ADR 0011); WAYFINDER_DB_URL uses the bridge-network service name.
      WAYFINDER_DB_URL: "postgres://wayfinder:wayfinder@db:5432/wayfinder?sslmode=disable"
      WAYFINDER_AUTH_MODE: "builtin"
      # Session-signing key. If left unset Wayfinder generates an ephemeral key and
      # warns (sessions reset on restart). Set a fixed key for production:
      #   export WAYFINDER_SESSION_KEY=$(openssl rand -hex 32)
      WAYFINDER_SESSION_KEY: ${WAYFINDER_SESSION_KEY:-}
      # Map center/zoom for the ASD frontend (default: Frankfurt, Firefly's demo).
      WAYFINDER_MAP_CENTER_LAT: ${WAYFINDER_MAP_CENTER_LAT:-50.0379}
      WAYFINDER_MAP_CENTER_LON: ${WAYFINDER_MAP_CENTER_LON:-8.5622}
      WAYFINDER_MAP_ZOOM: ${WAYFINDER_MAP_ZOOM:-8}
      # Base-map theme (ADR 0026): bkg-dark (official radar scope, default)
      # or bkg (bright). Legacy values dark/osm are aliased server-side.
      # WAYFINDER_BKG_STYLE_URL optionally points at a self-hosted mirror,
      # the grey variant or the Germany-only style.
      WAYFINDER_MAP_THEME: ${WAYFINDER_MAP_THEME:-bkg-dark}
      WAYFINDER_BKG_STYLE_URL: ${WAYFINDER_BKG_STYLE_URL:-}
      # DWD weather overlays (radar + warnings) and QNH (NOAA) are connected-by-
      # default (ADR 0017): ON out of the box; radar/warnings need outbound https to
      # maps.dwd.de, QNH to aviationweather.gov. The QNH aerodrome is set per tenant
      # in the Admin UI (qnh_icao). Disable per source:
      #   WAYFINDER_DWD_RADAR_ENABLED: "false"
      #   WAYFINDER_DWD_WARN_ENABLED: "false"
      #   WAYFINDER_QNH_ENABLED: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  wayfinder-db:
