# nginx config for the self-hosted base-map mirror (ADR 0026 H3,
# INSTALLATION.md §8.0a). Serves the BKG download package structure
# (fonts/ sprites/ styles/ tiles/) with the two properties the browser needs:
#
#  - CORS: tiles/sprite are fetched by the BROWSER directly from this mirror
#    (a different origin than Wayfinder). "*" is acceptable inside a closed
#    operations network; restrict to the Wayfinder origin otherwise.
#  - Pre-compressed tiles: the package's .pbf tiles are typically gzip-encoded
#    on disk and must be served with Content-Encoding: gzip (per the BKG
#    hosting instructions). Verify against your package version.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    add_header Access-Control-Allow-Origin * always;

    # Vector tiles + glyph ranges: protobuf, aggressive caching (a package
    # snapshot is immutable until the operator swaps in the next month).
    location ~ \.pbf$ {
        types { }
        default_type application/x-protobuf;
        # Uncomment if your package ships pre-gzipped .pbf files (the usual
        # case — check with: file basemap-mirror-data/tiles/**/…pbf):
        # add_header Content-Encoding gzip always;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location ~ \.json$ {
        default_type application/json;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "public, max-age=300" always;
    }
}
